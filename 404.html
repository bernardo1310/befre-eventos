<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Befre Eventos</title>
    <script>
        // Para GitHub Pages com subpath
        var pathPrefix = '/befre-eventos';
        var currentPath = window.location.pathname;
        
        // Se não for a raiz, redireciona para index.html
        if (!currentPath.endsWith('/') && !currentPath.endsWith('.html')) {
            var newPath = pathPrefix + '/?path=' + currentPath.replace(pathPrefix, '');
            window.location.href = newPath;
        } else {
            // Caso esteja na raiz, redireciona para index.html
            window.location.href = pathPrefix + '/';
        }
    </script>
</head>
<body>
    Redirecionando...
</body>
</html>
